# ---------------------------------------------------------------
# Serveur
# ---------------------------------------------------------------
server.port=8080

# ---------------------------------------------------------------
# Base de données PostgreSQL
# Remplace la classe DataBase.java de l'original
# ---------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/Connect4
spring.datasource.username=postgres
spring.datasource.password=mdp
spring.datasource.driver-class-name=org.postgresql.Driver

# Pool de connexions HikariCP (inclus dans Spring Boot)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=20000

# ---------------------------------------------------------------
# JPA / Hibernate (optionnel si tu gardes JDBC natif dans
# SauvegardeDatabase, mais utile pour la suite)
# ---------------------------------------------------------------
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.default_schema=s01

# ---------------------------------------------------------------
# Logs
# ---------------------------------------------------------------
logging.level.com.connect4=INFO
